<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fit Log</title>
  <link rel="stylesheet" href="workout-tracker.css">
</head>
<body>
  <main class="app">
    <section class="screen active" id="homeScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" id="prevDate" type="button" aria-label="前の日">&lt;</button>
          <div class="bar-title" id="homeDate"></div>
          <button class="bar-btn right" id="nextDate" type="button" aria-label="次の日">&gt;</button>
        </div>
        <div class="stats">
          <div class="stat"><span>合計種目数</span><strong id="statExercises">0</strong></div>
          <div class="stat"><span>合計セット数</span><strong id="statSets">0</strong></div>
          <div class="stat"><span>合計レップ数</span><strong id="statReps">0</strong></div>
          <div class="stat"><span>合計負荷量</span><strong id="statVolume">0</strong></div>
        </div>
      </header>
      <div class="preset-start">
        <select id="presetSelect" aria-label="プリセットを選択"></select>
        <button class="small-primary" id="startPresetBtn" type="button">開始</button>
        <button class="small-outline" data-go="preset" type="button">管理</button>
      </div>
      <div class="content" id="todayList"></div>
      <button class="fab" id="openSelectFab" type="button" aria-label="種目を追加">+</button>
    </section>

    <section class="screen" id="selectScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="home" type="button" aria-label="戻る">&lt;</button>
          <div class="bar-title">種目を選択</div>
          <button class="bar-btn right" id="toggleAdd" type="button">Edit</button>
        </div>
      </header>
      <div class="select-actions">
        <button class="outline-pill" id="showAddForm" type="button">部位・種目を追加</button>
      </div>
      <form class="add-form" id="addExerciseForm" hidden>
        <label>部位<input id="partInput" maxlength="12" placeholder="胸"></label>
        <label>種目名<input id="nameInput" maxlength="30"></label>
        <button class="primary" type="submit">追加して記録へ</button>
      </form>
      <div class="content" id="exerciseGroups"></div>
    </section>

    <section class="screen" id="detailScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="home" type="button">Back</button>
          <div class="bar-title" id="detailTitle"></div>
          <button class="history-btn" id="openExerciseHistory" type="button" aria-label="履歴">
            <svg viewBox="0 0 24 24"><path d="M4 19V5h16v14H4z"></path><path d="m7 15 4-4 3 3 3-5"></path></svg>
          </button>
        </div>
      </header>
      <div class="content">
        <div class="detail-summary" id="lastRecord"></div>
        <div class="detail-table" id="detailSets"></div>
      </div>
      <button class="fab" id="detailAddSet" type="button" aria-label="セットを追加">+</button>
    </section>

    <section class="screen" id="exerciseHistoryScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="detail" type="button" aria-label="戻る">&lt;</button>
          <div class="bar-title" id="exerciseHistoryTitle"></div>
          <span></span>
        </div>
      </header>
      <div class="exercise-history-wrap" id="exerciseHistoryList"></div>
    </section>

    <section class="screen" id="presetScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="home" type="button" aria-label="戻る">&lt;</button>
          <div class="bar-title">プリセット管理</div>
          <button class="bar-btn right" id="createPresetBtn" type="button">追加</button>
        </div>
      </header>
      <div class="preset-wrap" id="presetList"></div>
    </section>

    <section class="screen" id="presetEditScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="preset" type="button" aria-label="戻る">&lt;</button>
          <div class="bar-title">プリセット編集</div>
          <span></span>
        </div>
      </header>
      <div class="preset-wrap" id="presetEditor"></div>
    </section>

    <section class="screen" id="historyScreen">
      <header class="topbar">
        <div class="bar-row">
          <button class="bar-btn" data-go="home" type="button">Back</button>
          <div class="bar-title">履歴 / 分析</div>
          <span></span>
        </div>
      </header>
      <div class="history-wrap" id="historyList"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home" type="button">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z"></path></svg>
      <span>ホーム</span>
    </button>
    <button class="nav-item" data-nav="history" type="button">
      <svg viewBox="0 0 24 24"><path d="M5 4h14v18H5zM7 2h2v4H7zM15 2h2v4h-2zM8 10h8v2H8z"></path></svg>
      <span>履歴/分析</span>
    </button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="workout-tracker.js"></script>
</body>
</html>
